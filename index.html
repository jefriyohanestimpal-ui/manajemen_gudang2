<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocosGlobal - Owner Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
        .tab-active { border-bottom: 3px solid #16a34a; color: #16a34a; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- AUTH PAGE -->
    <div id="auth-page" class="flex items-center justify-center min-h-screen bg-green-900">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h2 class="text-3xl font-black text-center text-green-700 mb-6">COCOS <span class="text-gray-800">PRO</span></h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Supabase" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="handleAuth('login')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">LOGIN</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-500 py-2 text-sm hover:underline">Daftar Akun Baru</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <header class="bg-white shadow-sm p-4 sticky top-0 z-10 no-print flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center text-white font-bold">C</div>
                <h1 class="font-bold text-gray-800 uppercase tracking-wider">CocosGlobal Pro</h1>
            </div>
            <button onclick="handleLogout()" class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-500">Logout</button>
        </header>

        <main class="p-4 max-w-5xl mx-auto">
            <!-- Super Stats (Always Visible) -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Saldo Utama</p>
                    <h3 id="stat-saldo" class="text-xl font-black text-green-600">Rp 0</h3>
                    <button onclick="adjustBalance()" class="text-[10px] bg-green-50 text-green-600 px-2 py-0.5 rounded mt-1">+ Isi Modal</button>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Total Piutang</p>
                    <h3 id="stat-piutang" class="text-xl font-black text-orange-500">Rp 0</h3>
                </div>
                <div class="hidden md:block bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Koneksi</p>
                    <h3 class="text-sm font-bold text-blue-500 flex items-center gap-1">● Cloud Sync ON</h3>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex border-b mb-6 no-print">
                <button onclick="switchTab('pos')" id="btn-pos" class="px-6 py-2 tab-active">Kasir</button>
                <button onclick="switchTab('stok')" id="btn-stok" class="px-6 py-2 text-gray-500">Gudang</button>
                <button onclick="switchTab('histori')" id="btn-histori" class="px-6 py-2 text-gray-500">Histori</button>
            </div>

            <!-- TAB: KASIR (POS) -->
            <section id="tab-pos" class="tab-content animate-in fade-in duration-300">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase">Tipe Transaksi</label>
                                <select id="tx-type" class="w-full p-3 bg-gray-50 border rounded-xl font-bold">
                                    <option value="jual">JUAL (Stok Keluar)</option>
                                    <option value="beli">BELI (Stok Masuk)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase">Komoditi</label>
                                <select id="tx-item" class="w-full p-3 bg-gray-50 border rounded-xl font-bold"></select>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Jumlah</label>
                                    <input type="number" id="tx-qty" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" placeholder="0">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Satuan</label>
                                    <input type="text" id="tx-unit-display" disabled class="w-full p-3 bg-gray-100 border rounded-xl text-center">
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase">Harga Satuan (Rp)</label>
                                <input type="number" id="tx-price" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" placeholder="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6">
                        <label class="text-xs font-bold text-gray-400 uppercase">Metode Pembayaran</label>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <button onclick="setPay('tunai')" id="pay-tunai" class="pay-btn border-2 p-3 rounded-xl font-bold border-green-600 bg-green-50">TUNAI</button>
                            <button onclick="setPay('transfer')" id="pay-transfer" class="pay-btn border-2 p-3 rounded-xl font-bold border-gray-100">TRANSFER</button>
                            <button onclick="setPay('bon')" id="pay-bon" class="pay-btn border-2 p-3 rounded-xl font-bold border-gray-100">BON</button>
                        </div>
                    </div>

                    <button onclick="processTransaction()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-black text-lg mt-8 shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                        PROSES SEKARANG
                    </button>
                </div>
            </section>

            <!-- TAB: STOK -->
            <section id="tab-stok" class="tab-content hidden">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr><th class="p-4 text-xs font-bold text-gray-400">KOMODITI</th><th class="p-4 text-right text-xs font-bold text-gray-400">STOK GUDANG</th></tr>
                        </thead>
                        <tbody id="stok-list"></tbody>
                    </table>
                </div>
            </section>

            <!-- TAB: HISTORI -->
            <section id="tab-histori" class="tab-content hidden">
                <div class="flex justify-between mb-4">
                    <h2 class="font-bold">Semua Transaksi</h2>
                    <button onclick="window.print()" class="text-xs bg-white border px-3 py-1 rounded-lg">Cetak Laporan</button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4">Waktu</th><th class="p-4">Item</th><th class="p-4">Total</th><th class="p-4">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="histori-list"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- NOTA PRINT (HIDDEN) -->
    <div id="print-area" class="print-only p-8 text-center border-2 border-black m-4">
        <h1 class="text-2xl font-bold">COCOSGLOBAL</h1>
        <p id="p-date" class="text-sm"></p>
        <div class="my-4 border-t border-dashed border-black"></div>
        <div id="p-body" class="text-left space-y-1"></div>
        <div class="my-4 border-t border-dashed border-black"></div>
        <p class="font-bold">STATUS: LUNAS</p>
    </div>

    <script>
        // MASUKKAN URL & KEY SUPABASE ANDA
        const SB_URL = "https://vmxfvohcqrqkzkzblcix.supabase.co/rest/v1/";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZteGZ2b2hjcXJxa3premJsY2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTg4NzgsImV4cCI6MjA5MzUzNDg3OH0.Fir4V6KCSc6jGyIhByLTxaWN_q8h-pwm_WItdFKb21A";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let selectedPay = 'tunai';
        let stockData = [];

        // AUTH
        async function handleAuth(mode) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let result;

            if(mode === 'login') {
                result = await supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await supabase.auth.signUp({ email, password });
            }

            if(result.error) alert(result.error.message);
            else checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initApp();
            }
        }

        function handleLogout() {
            supabase.auth.signOut();
            location.reload();
        }

        // CORE
        async function initApp() {
            fetchStok();
            fetchSummary();
            // Listen realtime
            supabase.channel('db_changes').on('postgres_changes', { event: '*', schema: 'public' }, () => {
                fetchStok();
                fetchSummary();
                fetchTransactions();
            }).subscribe();
        }

        async function fetchStok() {
            const { data } = await supabase.from('warehouse_stock').select('*');
            stockData = data;
            const list = document.getElementById('stok-list');
            const select = document.getElementById('tx-item');
            list.innerHTML = ""; select.innerHTML = "";
            
            data.forEach(item => {
                list.innerHTML += `<tr class="border-b"><td class="p-4 font-bold text-gray-700">${item.commodity_name}</td><td class="p-4 text-right font-black text-green-700">${item.stock_quantity} <span class="text-[10px] text-gray-400">${item.unit}</span></td></tr>`;
                select.innerHTML += `<option value="${item.id}" data-unit="${item.unit}">${item.commodity_name}</option>`;
            });
            updateUnitDisplay();
        }

        function updateUnitDisplay() {
            const sel = document.getElementById('tx-item');
            const unit = sel.options[sel.selectedIndex]?.dataset.unit || 'unit';
            document.getElementById('tx-unit-display').value = unit;
        }

        document.getElementById('tx-item').onchange = updateUnitDisplay;

        function setPay(method) {
            selectedPay = method;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('border-green-600', 'bg-green-50'));
            document.getElementById('pay-' + method).classList.add('border-green-600', 'bg-green-50');
        }

        async function processTransaction() {
            const id = document.getElementById('tx-item').value;
            const name = document.getElementById('tx-item').options[document.getElementById('tx-item').selectedIndex].text;
            const type = document.getElementById('tx-type').value;
            const qty = parseFloat(document.getElementById('tx-qty').value);
            const price = parseFloat(document.getElementById('tx-price').value);
            const total = qty * price;

            if(!qty || !price) return alert("Input belum lengkap!");

            // Insert Transaction
            const { error: txErr } = await supabase.from('transactions').insert([{
                type, commodity_id: id, quantity: qty, unit_price: price, 
                total_price: total, payment_method: selectedPay, status: (selectedPay === 'bon' ? 'piutang' : 'lunas')
            }]);

            if(txErr) return alert(txErr.message);

            // Update Stock
            const curItem = stockData.find(s => s.id == id);
            let newQty = type === 'jual' ? curItem.stock_quantity - qty : curItem.stock_quantity + qty;
            await supabase.from('warehouse_stock').update({ stock_quantity: newQty }).eq('id', id);

            // Update Finance
            const { data: fin } = await supabase.from('finance_summary').select('*').single();
            let newBal = fin.total_balance;
            let newPiu = fin.total_receivable;

            if(type === 'jual') {
                if(selectedPay !== 'bon') newBal += total; else newPiu += total;
            } else {
                newBal -= total;
            }

            await supabase.from('finance_summary').update({ total_balance: newBal, total_receivable: newPiu }).eq('id', 1);

            alert("Berhasil!");
            doPrint(name, qty, total, selectedPay);
            document.getElementById('tx-qty').value = "";
            document.getElementById('tx-price').value = "";
        }

        async function fetchSummary() {
            const { data } = await supabase.from('finance_summary').select('*').single();
            document.getElementById('stat-saldo').innerText = "Rp " + data.total_balance.toLocaleString();
            document.getElementById('stat-piutang').innerText = "Rp " + data.total_receivable.toLocaleString();
        }

        async function fetchTransactions() {
            const { data } = await supabase.from('transactions').select(`*, warehouse_stock(commodity_name)`).order('created_at', {ascending:false});
            const list = document.getElementById('histori-list');
            list.innerHTML = "";
            data.forEach(tx => {
                list.innerHTML += `<tr class="border-b">
                    <td class="p-4 text-[10px] text-gray-400">${new Date(tx.created_at).toLocaleString()}</td>
                    <td class="p-4 font-bold">${tx.warehouse_stock.commodity_name} <br> <span class="text-[10px] font-normal text-gray-400">${tx.quantity} unit @ ${tx.unit_price}</span></td>
                    <td class="p-4 font-black">Rp ${tx.total_price.toLocaleString()}</td>
                    <td class="p-4">
                        <button onclick="hapusTx('${tx.id}')" class="text-red-400 hover:text-red-600">Hapus</button>
                    </td>
                </tr>`;
            });
        }

        async function hapusTx(id) {
            if(!confirm("Hapus transaksi ini secara permanen?")) return;
            await supabase.from('transactions').delete().eq('id', id);
        }

        async function adjustBalance() {
            const val = prompt("Masukkan jumlah modal/saldo baru:");
            if(val) {
                const { data } = await supabase.from('finance_summary').select('total_balance').single();
                let n = data.total_balance + parseFloat(val);
                await supabase.from('finance_summary').update({ total_balance: n }).eq('id', 1);
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('nav button, div button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + t).classList.add('tab-active');
            if(t === 'histori') fetchTransactions();
        }

        function doPrint(item, qty, total, pay) {
            document.getElementById('p-date').innerText = new Date().toLocaleString();
            document.getElementById('p-body').innerHTML = `
                <p>ITEM: ${item}</p>
                <p>JUMLAH: ${qty}</p>
                <p>TOTAL: Rp ${total.toLocaleString()}</p>
                <p>BAYAR: ${pay.toUpperCase()}</p>
            `;
            window.print();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
